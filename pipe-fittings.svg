<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img">
  <title>Four copper pipe fittings labelled A to D</title>
  <rect width="480" height="320" rx="12" fill="#f4f7fa"/>
  <g stroke="#8f4f26" stroke-width="3">
    <!-- A: 90 elbow -->
    <path d="M60 90h50v50" fill="none" stroke="#c2703c" stroke-width="26" stroke-linecap="butt"/>
    <!-- B: equal tee -->
    <path d="M200 90h100M250 90v50" fill="none" stroke="#c2703c" stroke-width="26"/>
    <!-- C: straight coupler -->
    <path d="M360 90h80" fill="none" stroke="#c2703c" stroke-width="26"/>
    <rect x="382" y="74" width="36" height="32" fill="#a85c2f"/>
    <!-- D: reducer -->
    <path d="M70 240h50" fill="none" stroke="#c2703c" stroke-width="34"/>
    <path d="M120 240h60" fill="none" stroke="#c2703c" stroke-width="18"/>
  </g>
  <g font-family="sans-serif" font-size="18" fill="#22303f" font-weight="bold">
    <text x="85" y="175">A</text><text x="245" y="175">B</text><text x="395" y="140">C</text><text x="120" y="290">D</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Arc Warden - Electrical improver wearing PPE and holding a insulated screwdriver">
  <title>Arc Warden - Electrical improver wearing PPE and holding a insulated screwdriver</title>
  <defs>
    <linearGradient id="bg16" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7b3fa0"/><stop offset="1" stop-color="#b06fd0"/>
    </linearGradient>
    <clipPath id="clip16"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <g clip-path="url(#clip16)">
    <rect width="200" height="200" fill="url(#bg16)"/>
    <circle cx="100" cy="196" r="86" fill="rgba(255,255,255,.10)"/>
    <!-- torso / hi-vis vest with reflective banding -->
    <path d="M46 200v-24c0-20 16-34 36-38h36c20 4 36 18 36 38v24z" fill="#c9f24a"/>
    <path d="M74 142l10 58h-9l-9-52z" fill="#eef3f6" opacity=".9"/>
    <path d="M126 142l-10 58h9l9-52z" fill="#eef3f6" opacity=".9"/>
    <rect x="46" y="176" width="108" height="8" fill="#eef3f6" opacity=".85"/>
    <!-- neck + head -->
    <rect x="88" y="112" width="24" height="28" rx="8" fill="#7d4a2c"/>
    <rect x="66" y="60" width="68" height="76" rx="30" fill="#7d4a2c"/>
    <!-- eyes (hidden under sealed helmets) -->
    <circle cx="86" cy="98" r="4.5" fill="#22262a"/><circle cx="114" cy="98" r="4.5" fill="#22262a"/><path d="M90 116q10 7 20 0" stroke="#22262a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- headgear -->
    <path d="M60 60h80v14H60z" fill="#2b2f4a"/><path d="M60 24h80v38H60z" fill="#2b2f4a"/><rect x="76" y="34" width="48" height="14" rx="3" fill="#1c2b22"/><rect x="54" y="70" width="92" height="9" rx="4" fill="#f5a623"/>
    <!-- tool -->
    <g transform="translate(124,84) rotate(14) scale(0.86)"><rect x="27" y="6" width="7" height="24" rx="3" fill="#d1352b"/><rect x="28.5" y="30" width="4" height="20" fill="#c2ccd4"/><rect x="27" y="48" width="7" height="5" fill="#e0b03a"/></g>
    <!-- glove holding tool -->
    <path d="M138 128c14-4 26 4 28 18l-24 6z" fill="#c9f24a" opacity=".95"/>
    <circle cx="146" cy="140" r="14" fill="#2b2f33"/>
  </g>
  <circle cx="100" cy="100" r="98" fill="none" stroke="rgba(0,0,0,.12)" stroke-width="4"/>
</svg>

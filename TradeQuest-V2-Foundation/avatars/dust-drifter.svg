<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Dust Drifter - Post-apocalyptic survivor wearing PPE and holding a blowtorch">
  <title>Dust Drifter - Post-apocalyptic survivor wearing PPE and holding a blowtorch</title>
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b5891f"/><stop offset="1" stop-color="#e6bb4a"/>
    </linearGradient>
    <clipPath id="clip5"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <g clip-path="url(#clip5)">
    <rect width="200" height="200" fill="url(#bg5)"/>
    <circle cx="100" cy="196" r="86" fill="rgba(255,255,255,.10)"/>
    <!-- torso / hi-vis vest with reflective banding -->
    <path d="M46 200v-24c0-20 16-34 36-38h36c20 4 36 18 36 38v24z" fill="#f7a83c"/>
    <path d="M74 142l10 58h-9l-9-52z" fill="#eef3f6" opacity=".9"/>
    <path d="M126 142l-10 58h9l9-52z" fill="#eef3f6" opacity=".9"/>
    <rect x="46" y="176" width="108" height="8" fill="#eef3f6" opacity=".85"/>
    <!-- neck + head -->
    <rect x="88" y="112" width="24" height="28" rx="8" fill="#f3c9a4"/>
    <rect x="66" y="60" width="68" height="76" rx="30" fill="#f3c9a4"/>
    <!-- eyes (hidden under sealed helmets) -->
    
    <!-- headgear -->
    <path d="M62 74c0-21 17-38 38-38s38 17 38 38z" fill="#b5762f"/><rect x="52" y="72" width="96" height="10" rx="5" fill="#b5762f"/><path d="M72 92h56v14c0 12-12 20-28 20s-28-8-28-20z" fill="#5f6a73"/><circle cx="76" cy="106" r="8" fill="#2b2f33"/><circle cx="124" cy="106" r="8" fill="#2b2f33"/>
    <!-- tool -->
    <g transform="translate(124,84) rotate(14) scale(0.86)"><rect x="24" y="24" width="14" height="30" rx="4" fill="#e0a531"/><rect x="28" y="12" width="6" height="14" fill="#8d99a3"/><path d="M31 2c5 6 5 9 0 12-5-3-5-6 0-12z" fill="#4fa3ff"/></g>
    <!-- glove holding tool -->
    <path d="M138 128c14-4 26 4 28 18l-24 6z" fill="#f7a83c" opacity=".95"/>
    <circle cx="146" cy="140" r="14" fill="#2b2f33"/>
  </g>
  <circle cx="100" cy="100" r="98" fill="none" stroke="rgba(0,0,0,.12)" stroke-width="4"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Crimp Captain - Terminations expert wearing PPE and holding a crimping tool">
  <title>Crimp Captain - Terminations expert wearing PPE and holding a crimping tool</title>
  <defs>
    <linearGradient id="bg18" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b46d6"/><stop offset="1" stop-color="#8f6df0"/>
    </linearGradient>
    <clipPath id="clip18"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <g clip-path="url(#clip18)">
    <rect width="200" height="200" fill="url(#bg18)"/>
    <circle cx="100" cy="196" r="86" fill="rgba(255,255,255,.10)"/>
    <!-- torso / hi-vis vest with reflective banding -->
    <path d="M46 200v-24c0-20 16-34 36-38h36c20 4 36 18 36 38v24z" fill="#c9f24a"/>
    <path d="M74 142l10 58h-9l-9-52z" fill="#eef3f6" opacity=".9"/>
    <path d="M126 142l-10 58h9l9-52z" fill="#eef3f6" opacity=".9"/>
    <rect x="46" y="176" width="108" height="8" fill="#eef3f6" opacity=".85"/>
    <!-- neck + head -->
    <rect x="88" y="112" width="24" height="28" rx="8" fill="#f3c9a4"/>
    <rect x="66" y="60" width="68" height="76" rx="30" fill="#f3c9a4"/>
    <!-- eyes (hidden under sealed helmets) -->
    <circle cx="86" cy="98" r="4.5" fill="#22262a"/><circle cx="114" cy="98" r="4.5" fill="#22262a"/><path d="M90 116q10 7 20 0" stroke="#22262a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- headgear -->
    <path d="M62 74c0-21 17-38 38-38s38 17 38 38z" fill="#5f6a73"/><rect x="52" y="72" width="96" height="10" rx="5" fill="#5f6a73"/><rect x="66" y="84" width="68" height="18" rx="9" fill="#9fdcf5" opacity=".75"/><rect x="66" y="84" width="68" height="18" rx="9" fill="none" stroke="#2b2f33" stroke-width="3"/>
    <!-- tool -->
    <g transform="translate(124,84) rotate(14) scale(0.86)"><path d="M18 52l10-22h4l-8 24z" fill="#2b2f33"/><path d="M42 52L32 30h-4l8 24z" fill="#2b2f33"/><rect x="22" y="12" width="16" height="16" rx="3" fill="#8d99a3"/></g>
    <!-- glove holding tool -->
    <path d="M138 128c14-4 26 4 28 18l-24 6z" fill="#c9f24a" opacity=".95"/>
    <circle cx="146" cy="140" r="14" fill="#2b2f33"/>
  </g>
  <circle cx="100" cy="100" r="98" fill="none" stroke="rgba(0,0,0,.12)" stroke-width="4"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Pipe Maestro - Italian-style tradesman wearing PPE and holding a pipe wrench">
  <title>Pipe Maestro - Italian-style tradesman wearing PPE and holding a pipe wrench</title>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9452f"/><stop offset="1" stop-color="#f0824a"/>
    </linearGradient>
    <clipPath id="clip2"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <g clip-path="url(#clip2)">
    <rect width="200" height="200" fill="url(#bg2)"/>
    <circle cx="100" cy="196" r="86" fill="rgba(255,255,255,.10)"/>
    <!-- torso / hi-vis vest with reflective banding -->
    <path d="M46 200v-24c0-20 16-34 36-38h36c20 4 36 18 36 38v24z" fill="#f7a83c"/>
    <path d="M74 142l10 58h-9l-9-52z" fill="#eef3f6" opacity=".9"/>
    <path d="M126 142l-10 58h9l9-52z" fill="#eef3f6" opacity=".9"/>
    <rect x="46" y="176" width="108" height="8" fill="#eef3f6" opacity=".85"/>
    <!-- neck + head -->
    <rect x="88" y="112" width="24" height="28" rx="8" fill="#f3c9a4"/>
    <rect x="66" y="60" width="68" height="76" rx="30" fill="#f3c9a4"/>
    <!-- eyes (hidden under sealed helmets) -->
    <circle cx="86" cy="98" r="4.5" fill="#22262a"/><circle cx="114" cy="98" r="4.5" fill="#22262a"/><path d="M90 116q10 7 20 0" stroke="#22262a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- headgear -->
    <path d="M66 76c0-19 15-34 34-34s34 15 34 34z" fill="#d1352b"/><path d="M134 70h34c0 8-6 12-14 12h-20z" fill="#ffffff"/><circle cx="100" cy="42" r="5" fill="#ffffff"/>
    <!-- tool -->
    <g transform="translate(124,84) rotate(14) scale(0.86)"><rect x="26" y="8" width="7" height="44" rx="3" fill="#d1352b"/><path d="M18 8h22v9H18z" fill="#9aa7b0"/><path d="M20 17h18v7H20z" fill="#6e7a85"/><rect x="24" y="46" width="11" height="8" rx="3" fill="#7d1f19"/></g>
    <!-- glove holding tool -->
    <path d="M138 128c14-4 26 4 28 18l-24 6z" fill="#f7a83c" opacity=".95"/>
    <circle cx="146" cy="140" r="14" fill="#2b2f33"/>
  </g>
  <circle cx="100" cy="100" r="98" fill="none" stroke="rgba(0,0,0,.12)" stroke-width="4"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Flux Knight - Press-fit pioneer wearing PPE and holding a press tool">
  <title>Flux Knight - Press-fit pioneer wearing PPE and holding a press tool</title>
  <defs>
    <linearGradient id="bg13" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f8a7d"/><stop offset="1" stop-color="#2fc3a8"/>
    </linearGradient>
    <clipPath id="clip13"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <g clip-path="url(#clip13)">
    <rect width="200" height="200" fill="url(#bg13)"/>
    <circle cx="100" cy="196" r="86" fill="rgba(255,255,255,.10)"/>
    <!-- torso / hi-vis vest with reflective banding -->
    <path d="M46 200v-24c0-20 16-34 36-38h36c20 4 36 18 36 38v24z" fill="#c9f24a"/>
    <path d="M74 142l10 58h-9l-9-52z" fill="#eef3f6" opacity=".9"/>
    <path d="M126 142l-10 58h9l9-52z" fill="#eef3f6" opacity=".9"/>
    <rect x="46" y="176" width="108" height="8" fill="#eef3f6" opacity=".85"/>
    <!-- neck + head -->
    <rect x="88" y="112" width="24" height="28" rx="8" fill="#f3c9a4"/>
    <rect x="66" y="60" width="68" height="76" rx="30" fill="#f3c9a4"/>
    <!-- eyes (hidden under sealed helmets) -->
    <circle cx="86" cy="98" r="4.5" fill="#22262a"/><circle cx="114" cy="98" r="4.5" fill="#22262a"/><path d="M90 116q10 7 20 0" stroke="#22262a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- headgear -->
    <path d="M62 74c0-21 17-38 38-38s38 17 38 38z" fill="#2f6fb2"/><rect x="52" y="72" width="96" height="10" rx="5" fill="#2f6fb2"/><rect x="66" y="84" width="68" height="18" rx="9" fill="#9fdcf5" opacity=".75"/><rect x="66" y="84" width="68" height="18" rx="9" fill="none" stroke="#2b2f33" stroke-width="3"/>
    <!-- tool -->
    <g transform="translate(124,84) rotate(14) scale(0.86)"><rect x="22" y="24" width="18" height="28" rx="5" fill="#2f6fb2"/><path d="M26 6h10v18H26z" fill="#8d99a3"/><path d="M22 4h18v6H22z" fill="#c2ccd4"/><rect x="26" y="32" width="10" height="4" fill="#173e66"/></g>
    <!-- glove holding tool -->
    <path d="M138 128c14-4 26 4 28 18l-24 6z" fill="#c9f24a" opacity=".95"/>
    <circle cx="146" cy="140" r="14" fill="#2b2f33"/>
  </g>
  <circle cx="100" cy="100" r="98" fill="none" stroke="rgba(0,0,0,.12)" stroke-width="4"/>
</svg>

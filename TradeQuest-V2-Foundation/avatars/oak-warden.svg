<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Oak Warden - Fantasy warrior wearing PPE and holding a framing hammer">
  <title>Oak Warden - Fantasy warrior wearing PPE and holding a framing hammer</title>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f5fa8"/><stop offset="1" stop-color="#4f9de0"/>
    </linearGradient>
    <clipPath id="clip3"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <g clip-path="url(#clip3)">
    <rect width="200" height="200" fill="url(#bg3)"/>
    <circle cx="100" cy="196" r="86" fill="rgba(255,255,255,.10)"/>
    <!-- torso / hi-vis vest with reflective banding -->
    <path d="M46 200v-24c0-20 16-34 36-38h36c20 4 36 18 36 38v24z" fill="#c9f24a"/>
    <path d="M74 142l10 58h-9l-9-52z" fill="#eef3f6" opacity=".9"/>
    <path d="M126 142l-10 58h9l9-52z" fill="#eef3f6" opacity=".9"/>
    <rect x="46" y="176" width="108" height="8" fill="#eef3f6" opacity=".85"/>
    <!-- neck + head -->
    <rect x="88" y="112" width="24" height="28" rx="8" fill="#7d4a2c"/>
    <rect x="66" y="60" width="68" height="76" rx="30" fill="#7d4a2c"/>
    <!-- eyes (hidden under sealed helmets) -->
    <circle cx="86" cy="98" r="4.5" fill="#22262a"/><circle cx="114" cy="98" r="4.5" fill="#22262a"/><path d="M90 116q10 7 20 0" stroke="#22262a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- headgear -->
    <path d="M64 76c0-20 16-36 36-36s36 16 36 36z" fill="#8d99a3"/><rect x="58" y="72" width="84" height="9" rx="4" fill="#c98a2f"/><path d="M64 66c-14-4-24 4-26 16 10 2 20-4 26-8z" fill="#f0e2c8"/><path d="M136 66c14-4 24 4 26 16-10 2-20-4-26-8z" fill="#f0e2c8"/><rect x="96" y="72" width="8" height="26" rx="3" fill="#c98a2f"/>
    <!-- tool -->
    <g transform="translate(124,84) rotate(14) scale(0.86)"><rect x="27" y="18" width="7" height="36" rx="3" fill="#2b2f33"/><path d="M16 6h28v12H16z" fill="#8d99a3"/><rect x="16" y="18" width="8" height="5" fill="#5f6a73"/></g>
    <!-- glove holding tool -->
    <path d="M138 128c14-4 26 4 28 18l-24 6z" fill="#c9f24a" opacity=".95"/>
    <circle cx="146" cy="140" r="14" fill="#2b2f33"/>

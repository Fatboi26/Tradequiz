<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Salty Crank - Pirate captain wearing PPE and holding a pipe cutter">
  <title>Salty Crank - Pirate captain wearing PPE and holding a pipe cutter</title>
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7b3fa0"/><stop offset="1" stop-color="#b06fd0"/>
    </linearGradient>
    <clipPath id="clip10"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <g clip-path="url(#clip10)">
    <rect width="200" height="200" fill="url(#bg10)"/>
    <circle cx="100" cy="196" r="86" fill="rgba(255,255,255,.10)"/>
    <!-- torso / hi-vis vest with reflective banding -->
    <path d="M46 200v-24c0-20 16-34 36-38h36c20 4 36 18 36 38v24z" fill="#f7a83c"/>
    <path d="M74 142l10 58h-9l-9-52z" fill="#eef3f6" opacity=".9"/>
    <path d="M126 142l-10 58h9l9-52z" fill="#eef3f6" opacity=".9"/>
    <rect x="46" y="176" width="108" height="8" fill="#eef3f6" opacity=".85"/>
    <!-- neck + head -->
    <rect x="88" y="112" width="24" height="28" rx="8" fill="#f3c9a4"/>
    <rect x="66" y="60" width="68" height="76" rx="30" fill="#f3c9a4"/>
    <!-- eyes (hidden under sealed helmets) -->
    <circle cx="86" cy="98" r="4.5" fill="#22262a"/><circle cx="114" cy="98" r="4.5" fill="#22262a"/><path d="M90 116q10 7 20 0" stroke="#22262a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- headgear -->
    <path d="M64 76c0-19 16-34 36-34s36 15 36 34z" fill="#e0b03a"/><path d="M40 74c14-26 40-34 60-34s46 8 60 34c-18 8-40 10-60 10s-42-2-60-10z" fill="#2b2f33"/><circle cx="100" cy="58" r="7" fill="#f0e2c8"/>
    <!-- tool -->
    <g transform="translate(124,84) rotate(14) scale(0.86)"><path d="M18 34c0-9 7-16 16-16v8a8 8 0 100 16v8c-9 0-16-7-16-16z" fill="#c94f3d"/><circle cx="40" cy="34" r="7" fill="#dfe6ea"/><circle cx="40" cy="34" r="2.5" fill="#5f6a73"/></g>
    <!-- glove holding tool -->
    <path d="M138 128c14-4 26 4 28 18l-24 6z" fill="#f7a83c" opacity=".95"/>
    <circle cx="146" cy="140" r="14" fill="#2b2f33"/>
  </g>
  <circle cx="100" cy="100" r="98" fill="none" stroke="rgba(0,0,0,.12)" stroke-width="4"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="TradeQuest">
  <!-- The signature shield shape: three radii round, one square. Same motif as
       the answer tiles and the CNWL logo. Colours are literal here because a
       favicon is fetched outside the page and cannot read CSS variables. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00857D"/>
      <stop offset="0.55" stop-color="#2C5FA8"/>
      <stop offset="1" stop-color="#B0208C"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="16" ry="16" fill="#0E1826"/>
  <path d="M12 26a14 14 0 0 1 14-14h12a14 14 0 0 1 14 14v12a14 14 0 0 1-14 14H12z" fill="url(#g)"/>
  <!-- Spirit-level vial: the platform's XP bar in miniature. -->
  <rect x="18" y="30" width="28" height="9" rx="4.5" fill="#0E1826" opacity="0.55"/>
  <circle cx="38" cy="34.5" r="3.2" fill="#F5B93B"/>
</svg>

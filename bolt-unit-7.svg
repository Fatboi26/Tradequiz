<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Bolt Unit 7 - Robot engineer wearing PPE and holding a multimeter">
  <title>Bolt Unit 7 - Robot engineer wearing PPE and holding a multimeter</title>
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9452f"/><stop offset="1" stop-color="#f0824a"/>
    </linearGradient>
    <clipPath id="clip8"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <g clip-path="url(#clip8)">
    <rect width="200" height="200" fill="url(#bg8)"/>
    <circle cx="100" cy="196" r="86" fill="rgba(255,255,255,.10)"/>
    <!-- torso / hi-vis vest with reflective banding -->
    <path d="M46 200v-24c0-20 16-34 36-38h36c20 4 36 18 36 38v24z" fill="#c9f24a"/>
    <path d="M74 142l10 58h-9l-9-52z" fill="#eef3f6" opacity=".9"/>
    <path d="M126 142l-10 58h9l9-52z" fill="#eef3f6" opacity=".9"/>
    <rect x="46" y="176" width="108" height="8" fill="#eef3f6" opacity=".85"/>
    <!-- neck + head -->
    <rect x="88" y="112" width="24" height="28" rx="8" fill="#b9c4cc"/>
    <rect x="66" y="60" width="68" height="76" rx="30" fill="#b9c4cc"/>
    <!-- eyes (hidden under sealed helmets) -->
    
    <!-- headgear -->
    <rect x="62" y="44" width="76" height="60" rx="16" fill="#8d99a3"/><rect x="72" y="62" width="56" height="22" rx="8" fill="#1c2b3a"/><circle cx="88" cy="73" r="5" fill="#4fc3f7"/><circle cx="112" cy="73" r="5" fill="#4fc3f7"/><rect x="96" y="26" width="8" height="18" fill="#8d99a3"/><circle cx="100" cy="24" r="6" fill="#4fc3f7"/>
    <!-- tool -->
    <g transform="translate(124,84) rotate(14) scale(0.86)"><rect x="14" y="10" width="32" height="42" rx="5" fill="#e0a531"/><rect x="19" y="15" width="22" height="12" rx="2" fill="#1c2b22"/><circle cx="30" cy="38" r="7" fill="#2b2f33"/></g>
    <!-- glove holding tool -->
    <path d="M138 128c14-4 26 4 28 18l-24 6z" fill="#c9f24a" opacity=".95"/>
    <circle cx="146" cy="140" r="14" fill="#2b2f33"/>
  </g>
  <circle cx="100" cy="100" r="98" fill="none" stroke="rgba(0,0,0,.12)" stroke-width="4"/>

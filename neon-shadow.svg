<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Neon Shadow - Cyber ninja wearing PPE and holding a side cutters">
  <title>Neon Shadow - Cyber ninja wearing PPE and holding a side cutters</title>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7b3fa0"/><stop offset="1" stop-color="#b06fd0"/>
    </linearGradient>
    <clipPath id="clip4"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <g clip-path="url(#clip4)">
    <rect width="200" height="200" fill="url(#bg4)"/>
    <circle cx="100" cy="196" r="86" fill="rgba(255,255,255,.10)"/>
